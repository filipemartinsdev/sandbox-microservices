services:
  # GATEWAY / REVERSE PROXY
  gateway:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - auth-service
      - core-service
    restart: unless-stopped
    networks:
      - app-network

  # AUTH SERVICE: Spring Boot + Java + Maven
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
#    ports:
#      - "8080:8080"
    environment:
#      - SPRING_PROFILES_ACTIVE=dev
      - ACTIVE_PROFILE=dev
      - DB_DATABASE
      - DB_USERNAME
      - DB_PASSWORD
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_DATABASE}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=cache
      - SPRING_DATA_REDIS_PORT=6379
    # deploy:
      # replicas: 1
    networks:
      - app-network
    depends_on:
      - db
      - cache
    restart: unless-stopped

  # CORE SERVICE: Quarkus + Kotlin + Gradle
  core-service:
    build:
      context: ./core-service
      dockerfile: src/main/docker/Dockerfile.jvm
    deploy:
      replicas: 1
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/${DB_DATABASE}
      - QUARKUS_REDIS_HOST=redis://cache:6379
      - ${DB_DATABASE}
      - ${DB_USERNAME}
      - ${DB_PASSWORD}
    networks:
      - app-network
    depends_on:
      - db
      - cache
    restart: unless-stopped


  # INFRA
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DATABASE: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
#      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - app-network
    restart: unless-stopped


  cache:
    image: redis:alpine
    networks:
      - app-network
    restart: unless-stopped
  
  # OBSERVABILITY
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - 9090:9090
    restart: unless-stopped
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:Z
      - prom_data:/var/prometheus
    networks:
      - app-network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - ./grafana.yaml:/etc/grafana/provisioning/datasources/prometheus.yml:Z
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  prom_data:
